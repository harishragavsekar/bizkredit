# Server port
server.port=8081
spring.application.name=bizkredit

# MySQL database connection
spring.datasource.url=jdbc:mysql://localhost:3306/bizkredit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate - update creates/alters tables automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.com.bizkredit=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Secret key used to sign and verify JWT tokens (must be at least 32 characters for HS256)
jwt.secret=${JWT_SECRET:bizkredit-super-secret-key-must-be-at-least-32-chars-long}

#Token validity period in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# DEV/TEST ONLY: when true, the forgot-password response includes the raw reset token
bizkredit.security.expose-reset-token-in-response=true

# to persist authorization in swagger
springdoc.swagger-ui.persistAuthorization=true

#date and time
spring.jackson.date-format=dd-MM-yyyy HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata