spring.application.name=bizkredit

# MySQL Database - allowPublicKeyRetrieval=true fixes "Public Key Retrieval is not allowed" on some machines
spring.datasource.url=jdbc:mysql://localhost:3306/bizkredit_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8081

# JWT
jwt.secret=bizkredit-secret-key-for-jwt-token-generation-2026
jwt.expiration=86400000

# Logging
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
