# ============================================================
# BizKredit – application.properties  (local dev)
# ============================================================

# Server
server.port=8080
spring.application.name=bizkredit

# ── MySQL connection ──────────────────────────────────────────
# Change username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/bizkredit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate / JPA ──────────────────────────────────────────
# update  → auto-creates / alters tables on startup (fine for dev)
# validate → use this once schema is stable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Logging ──────────────────────────────────────────────────
logging.level.com.bizkredit=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
